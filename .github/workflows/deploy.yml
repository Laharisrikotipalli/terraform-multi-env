name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: "1.9.5"

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Terraform Init
        run: terraform init -backend-config=backend.hcl -input=false

      - name: Select Staging Workspace
        run: |
          terraform workspace select staging \
            || terraform workspace new staging

      - name: Terraform Plan
        run: terraform plan -input=false -var-file=environments/staging.tfvars -out=tfplan

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve tfplan

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Terraform Init
        run: terraform init -backend-config=backend.hcl -input=false

      - name: Select Production Workspace
        run: |
          terraform workspace select production \
            || terraform workspace new production

      - name: Terraform Plan
        run: terraform plan -input=false -var-file=environments/production.tfvars -out=tfplan

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve tfplan
